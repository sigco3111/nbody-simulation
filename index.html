<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>N-Body Gravity Simulation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  canvas#stage {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  .hud {
    position: fixed;
    pointer-events: none;
    z-index: 10;
    font-size: 12px;
    line-height: 1.55;
    user-select: none;
    text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
  }
  .hud.hidden { display: none; }
  #hud-title {
    top: 18px;
    left: 20px;
  }
  #hud-title .t {
    font-size: 14px;
    letter-spacing: 0.18em;
    color: #ffffff;
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(120, 220, 255, 0.6);
  }
  #hud-title .l {
    color: rgba(190, 230, 255, 0.85);
  }
  #hud-title kbd {
    display: inline-block;
    padding: 1px 6px;
    margin: 0 2px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    color: #fff;
    background: rgba(255, 255, 255, 0.06);
  }
  #hud-title .ac { color: #ff80ff; }
  #hud-stats {
    top: 18px;
    right: 20px;
    text-align: right;
    color: rgba(200, 255, 230, 0.85);
  }
  #hud-stats .row { white-space: nowrap; }
  #hud-stats .k { color: rgba(255, 255, 255, 0.55); margin-right: 6px; }
  #hud-stats .v { font-weight: 600; }
  #hud-stats .v.bodies { color: #5cf2ff; text-shadow: 0 0 8px rgba(92, 242, 255, 0.6); }
  #hud-stats .v.holes  { color: #ff5b8a; text-shadow: 0 0 8px rgba(255, 91, 138, 0.6); }
  #hud-stats .v.fps    { color: #b5ff80; }
  #hud-stats .v.paused { color: #ffcc40; text-shadow: 0 0 8px rgba(255, 204, 64, 0.7); }
  #pause-banner {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
  }
  #pause-banner.on { display: flex; }
  #pause-banner span {
    font-size: 48px;
    letter-spacing: 0.4em;
    color: rgba(255, 255, 255, 0.18);
    text-shadow: 0 0 30px rgba(120, 220, 255, 0.4);
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="hud-title" class="hud">
  <div class="t">◉ N-BODY SIMULATION</div>
  <div class="l"><span class="ac">⌖ CLICK</span> anywhere to forge a <span class="ac">BLACK HOLE</span></div>
  <div class="l"><kbd>R</kbd> reset · <kbd>Space</kbd> pause · <kbd>H</kbd> HUD</div>
</div>

<div id="hud-stats" class="hud">
  <div class="row"><span class="k">BODIES</span><span class="v bodies" id="stat-bodies">0</span></div>
  <div class="row"><span class="k">HOLES</span><span class="v holes" id="stat-holes">0</span></div>
  <div class="row"><span class="k">FPS</span><span class="v fps" id="stat-fps">0</span></div>
  <div class="row"><span class="k">STATE</span><span class="v" id="stat-state">RUN</span></div>
</div>

<div id="pause-banner"><span>PAUSED</span></div>

<script>
(() => {
  'use strict';

  // ============================================================
  // CONFIG — tweak these to taste
  // ============================================================
  const CONFIG = {
    BODY_COUNT:       50,     // number of celestial bodies
    G:                0.5,    // gravitational constant (overall pull strength)
    TRAIL_FADE:       0.06,   // alpha of the semi-transparent black fade per frame (lower = longer trails)
    MAX_SPEED:        8,      // velocity clamp per body (prevents BH heat-up runaway)
    BLACK_HOLE_PULL:  5,      // multiplier on BH gravitational pull per frame
    SOFTENING:        20,     // Plummer softening epsilon — prevents r→0 singularities
    BH_BASE_MASS:     5000,   // initial mass of a black hole on spawn
    DT:               1.0,    // simulation timestep (Verlet-friendly)
    MERGE_FACTOR:     0.28,   // fraction of summed radii at which bodies merge
    RESPAWN_THRESHOLD: 15,    // respawn bodies when count drops below this
    RESPAWN_BATCH:     30,    // how many to spawn each refill
    STAR_COUNT:       220,    // background twinkling stars
    NEBULA_COUNT:       5,    // diffuse background nebula clouds
    DARKEN_CORNERS:    true,  // subtle vignette to focus the eye on the center
    CENTRAL_MASS:    1500,    // anchor body at canvas center — keeps orbits stable
    // ----- visual FX knobs -----
    USE_ADDITIVE_GLOW: true,  // 'lighter' composite for true fluorescent overlap
    JET_RATE:        0.55,    // prob per frame of spawning a jet particle from each BH
    JET_LIFE:          55,    // frames a jet particle lives
    FLASH_LIFE:        28,    // frames an absorption flash expands/fades
    MOTION_STREAK:  true,    // short streak behind fast bodies
    LENSING_RINGS:  true,    // concentric arcs around BHs (lensing approximation)
    DOPPLER_DISK:   true,    // red/blue shift on accretion disk (relativistic feel)
    NEBULA_ENABLED: true,    // diffuse color clouds in background
  };

  // ============================================================
  // Canvas / DOM
  // ============================================================
  const canvas   = document.getElementById('stage');
  const ctx      = canvas.getContext('2d', { alpha: false });
  const hudTitle = document.getElementById('hud-title');
  const hudStats = document.getElementById('hud-stats');
  const statBodies = document.getElementById('stat-bodies');
  const statHoles  = document.getElementById('stat-holes');
  const statFps    = document.getElementById('stat-fps');
  const statState  = document.getElementById('stat-state');
  const pauseBanner = document.getElementById('pause-banner');

  let W = 0, H = 0, CX = 0, CY = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    CX = W / 2;
    CY = H / 2;
    if (stars && stars.length) placeStars();
    if (nebulae && nebulae.length) {
      for (const n of nebulae) {
        n.x = Math.random() * W;
        n.y = Math.random() * H;
      }
    }
  }

  // ============================================================
  // Fluorescent palette
  // ============================================================
  const PALETTE = [
    '#ff2bd6', '#ff3ec8', '#a050ff', '#5070ff',
    '#20d8ff', '#00f0c8', '#00ff8c', '#80ff20',
    '#e8ff20', '#ffb020', '#ff7020', '#ff3060',
    '#ff60b0', '#b080ff', '#80e0ff', '#80ffd0'
  ];
  const rgbCache = new Map();
  function rgb(hex) {
    if (rgbCache.has(hex)) return rgbCache.get(hex);
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const v = [r, g, b];
    rgbCache.set(hex, v);
    return v;
  }
  function rgba(hex, a) {
    const [r, g, b] = rgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ============================================================
  // Body — point mass with velocity & radius
  // ============================================================
  class Body {
    constructor(x, y, vx, vy, mass, color) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.mass = mass;
      this.color = color;
      this.radius = Math.max(1.4, Math.cbrt(mass) * 1.45);
      this.alive = true;
    }
  }

  // ============================================================
  // BlackHole — high-mass sink with shockwave + accretion visuals
  // ============================================================
  class BlackHole {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = 0; this.vy = 0;
      this.mass = CONFIG.BH_BASE_MASS;
      this.radius = Math.max(10, Math.cbrt(this.mass) * 0.85);
      this.spin   = Math.random() * Math.PI * 2;
      this.t      = 0;
      this.shock  = 1;          // 1 → 0 fade for spawn shockwave
      this.born   = true;
      // Initial nudge from kinetic energy in the neighborhood
      this.captureNearbyMomentum();
    }
    captureNearbyMomentum() {
      let mx = 0, my = 0, M = 0;
      for (const b of bodies) {
        const dx = b.x - this.x, dy = b.y - this.y;
        const r2 = dx * dx + dy * dy;
        if (r2 < 40000) { // within 200 px
          const w = b.mass;
          mx += b.vx * w; my += b.vy * w; M += w;
        }
      }
      if (M > 0) {
        this.vx = (mx / M) * 0.05;
        this.vy = (my / M) * 0.05;
      }
    }
    absorb(other) {
      const M = this.mass + other.mass;
      this.vx = (this.vx * this.mass + other.vx * other.mass) / M;
      this.vy = (this.vy * this.mass + other.vy * other.mass) / M;
      this.mass = M;
      this.radius = Math.max(10, Math.cbrt(M) * 0.85);
      // Center of mass shift
      this.x = (this.x * this.mass + other.x * other.mass) / M;
      this.y = (this.y * this.mass + other.y * other.mass) / M;
    }
    update() {
      this.t += 1;
      this.spin += 0.035;
      if (this.shock > 0) this.shock = Math.max(0, this.shock - 0.025);
      // Drifts a hair with its own velocity (mostly stable)
      this.x += this.vx * CONFIG.DT;
      this.y += this.vy * CONFIG.DT;
      // Damp very small drift to keep BH planted
      this.vx *= 0.995;
      this.vy *= 0.995;
    }
  }

  // ============================================================
  // JetParticle — emitted from black-hole poles, drifts outward & fades
  // ============================================================
  class JetParticle {
    constructor(x, y, vx, vy, life, hue) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.life = life;
      this.maxLife = life;
      this.hue = hue;       // 0-360
      this.size = 1.2 + Math.random() * 1.8;
    }
  }

  // ============================================================
  // Flash — bright burst where a body was absorbed
  // ============================================================
  class Flash {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.color = color;
      this.life = CONFIG.FLASH_LIFE;
      this.maxLife = CONFIG.FLASH_LIFE;
    }
  }

  // ============================================================
  // State
  // ============================================================
  let bodies = [];
  let blackHoles = [];
  let stars = [];
  let nebulae = [];
  let jets = [];       // particle objects emitted by BHs
  let flashes = [];    // bright bursts on body absorption
  let paused = false;
  let hudVisible = true;

  // Pre-allocated acceleration buffers (Verlet needs two)
  const NMAX = CONFIG.BODY_COUNT + 80;
  const axBuf1 = new Float64Array(NMAX);
  const ayBuf1 = new Float64Array(NMAX);
  const axBuf2 = new Float64Array(NMAX);
  const ayBuf2 = new Float64Array(NMAX);

  // ============================================================
  // Background starfield (drawn under the trail layer)
  // ============================================================
  function placeStars() {
    for (const s of stars) {
      s.x = Math.random() * W;
      s.y = Math.random() * H;
      s.r = Math.random() * 1.4 + 0.2;
      s.phase = Math.random() * Math.PI * 2;
      s.speed = 0.01 + Math.random() * 0.04;
    }
  }
  function initStars() {
    stars = new Array(CONFIG.STAR_COUNT);
    for (let i = 0; i < CONFIG.STAR_COUNT; i++) {
      stars[i] = {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: 0.01 + Math.random() * 0.04,
      };
    }
  }

  // ============================================================
  // Background nebulae — diffuse colored clouds for depth
  // ============================================================
  function initNebulae() {
    nebulae = [];
    const hues = [220, 280, 320, 20, 180]; // blue, purple, pink, orange, teal
    for (let i = 0; i < CONFIG.NEBULA_COUNT; i++) {
      nebulae.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 180 + Math.random() * 320,
        hue: hues[i % hues.length] + (Math.random() * 30 - 15),
        alpha: 0.04 + Math.random() * 0.05,
      });
    }
  }

  // ============================================================
  // Body initialization — galaxy-like disk with varied masses
  // ============================================================
  function rand(min, max) { return min + Math.random() * (max - min); }
  function pick(arr)      { return arr[(Math.random() * arr.length) | 0]; }

  function initBodies() {
    bodies = [];
    blackHoles = [];

    const minDim = Math.min(W, H);

    // Anchor body at canvas center — provides the central gravity well
    // that keeps the system bound and visually coherent.
    const anchorColor = '#fff6c0'; // warm-white sun
    bodies.push(new Body(CX, CY, 0, 0, CONFIG.CENTRAL_MASS, anchorColor));

    for (let i = 0; i < CONFIG.BODY_COUNT; i++) {
      const angle    = Math.random() * Math.PI * 2;
      // Sqrt distribution → roughly uniform area density, biased outward
      const distance = 80 + Math.sqrt(Math.random()) * minDim * 0.42;

      const x = CX + Math.cos(angle) * distance;
      const y = CY + Math.sin(angle) * distance;

      // Mass distribution: most small, a few large
      const roll = Math.random();
      const mass = roll < 0.18 ? rand(28, 80)
                 : roll < 0.65 ? rand( 5, 24)
                 :               rand( 1.5, 5);

      // Keplerian circular speed around the central anchor mass.
      // (Sum of other body masses is small relative to anchor — good approx.)
      const orbitSpeed = Math.sqrt(CONFIG.G * CONFIG.CENTRAL_MASS / distance) * rand(0.85, 1.08);
      const vx = -Math.sin(angle) * orbitSpeed + rand(-0.4, 0.4);
      const vy =  Math.cos(angle) * orbitSpeed + rand(-0.4, 0.4);

      bodies.push(new Body(x, y, vx, vy, mass, pick(PALETTE)));
    }
  }

  function respawnBatch(n) {
    const minDim = Math.min(W, H);
    for (let i = 0; i < n; i++) {
      const angle    = Math.random() * Math.PI * 2;
      const distance = 100 + Math.random() * minDim * 0.40;
      const x = CX + Math.cos(angle) * distance;
      const y = CY + Math.sin(angle) * distance;
      const speed = Math.sqrt(CONFIG.G * CONFIG.CENTRAL_MASS / distance) * rand(0.7, 1.2);
      const vx = -Math.sin(angle) * speed;
      const vy =  Math.cos(angle) * speed;
      const mass = rand(3, 22);
      bodies.push(new Body(x, y, vx, vy, mass, pick(PALETTE)));
    }
  }

  // ============================================================
  // N-body accelerations (body-body + body-BH)
  // ============================================================
  function computeAccelerations(axOut, ayOut) {
    const n = bodies.length;
    const SOFT2 = CONFIG.SOFTENING * CONFIG.SOFTENING;
    const Gmul  = CONFIG.G;
    const Gbh   = CONFIG.G * CONFIG.BLACK_HOLE_PULL;
    const bhN   = blackHoles.length;

    for (let i = 0; i < n; i++) {
      const bi = bodies[i];
      const bxi = bi.x, byi = bi.y;
      let ax = 0, ay = 0;

      // Body-body
      for (let j = 0; j < n; j++) {
        if (j === i) continue;
        const bj = bodies[j];
        const dx = bj.x - bxi;
        const dy = bj.y - byi;
        const r2 = dx * dx + dy * dy + SOFT2;
        const invR = 1 / Math.sqrt(r2);
        const f = Gmul * bj.mass / r2;
        ax += f * dx * invR;
        ay += f * dy * invR;
      }

      // Body-BH
      for (let k = 0; k < bhN; k++) {
        const bh = blackHoles[k];
        const dx = bh.x - bxi;
        const dy = bh.y - byi;
        const r2 = dx * dx + dy * dy + SOFT2;
        const invR = 1 / Math.sqrt(r2);
        const f = Gbh * bh.mass / r2;
        ax += f * dx * invR;
        ay += f * dy * invR;
      }

      axOut[i] = ax;
      ayOut[i] = ay;
    }
  }

  // ============================================================
  // Update — Velocity Verlet
  // ============================================================
  function update() {
    if (paused) return;
    const n = bodies.length;
    if (n === 0) return;

    const DT = CONFIG.DT;

    // Step 1: a(t)
    computeAccelerations(axBuf1, ayBuf1);

    // Step 2: x(t+dt) = x + v*dt + 0.5*a*dt^2
    for (let i = 0; i < n; i++) {
      const b = bodies[i];
      b.x += b.vx * DT + 0.5 * axBuf1[i] * DT * DT;
      b.y += b.vy * DT + 0.5 * ayBuf1[i] * DT * DT;
    }

    // Step 3: a(t+dt)
    computeAccelerations(axBuf2, ayBuf2);

    // Step 4: v(t+dt) = v + 0.5*(a(t)+a(t+dt))*dt, then clamp
    const VMAX = CONFIG.MAX_SPEED;
    const VMAX2 = VMAX * VMAX;
    for (let i = 0; i < n; i++) {
      const b = bodies[i];
      let vx = b.vx + 0.5 * (axBuf1[i] + axBuf2[i]) * DT;
      let vy = b.vy + 0.5 * (ayBuf1[i] + ayBuf2[i]) * DT;
      const v2 = vx * vx + vy * vy;
      if (v2 > VMAX2) {
        const s = VMAX / Math.sqrt(v2);
        vx *= s; vy *= s;
      }
      b.vx = vx; b.vy = vy;
    }

    // BH drift / visual update
    for (const bh of blackHoles) bh.update();

    // Body-body inelastic merges (conservation of momentum + mass)
    const mergeR2 = CONFIG.MERGE_FACTOR * CONFIG.MERGE_FACTOR;
    outer:
    for (let i = 0; i < bodies.length; i++) {
      const a = bodies[i];
      for (let j = i + 1; j < bodies.length; j++) {
        const b = bodies[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const minR = a.radius + b.radius;
        if (dx * dx + dy * dy < minR * minR * mergeR2) {
          // Merge smaller into larger
          let big, small;
          if (a.mass >= b.mass) { big = a; small = b; }
          else                  { big = b; small = a; }
          const M = big.mass + small.mass;
          big.vx = (big.vx * big.mass + small.vx * small.mass) / M;
          big.vy = (big.vy * big.mass + small.vy * small.mass) / M;
          big.mass = M;
          big.radius = Math.max(1.4, Math.cbrt(M) * 1.45);
          big.x = (big.x * big.mass + small.x * small.mass) / M;
          big.y = (big.y * big.mass + small.y * small.mass) / M;
          // Inherit small body's color occasionally for visual variation
          if (Math.random() < 0.3) big.color = small.color;
          small.alive = false;
          break outer;
        }
      }
    }
    if (bodies.some(b => !b.alive)) {
      bodies = bodies.filter(b => b.alive);
    }

    // Body-BH absorption
    const absorbPads = 1.15; // a bit larger than event horizon for visual grace
    const toRemove = [];
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      for (const bh of blackHoles) {
        const dx = bh.x - b.x, dy = bh.y - b.y;
        const R = bh.radius * absorbPads;
        if (dx * dx + dy * dy < R * R) {
          // Capture color BEFORE absorb (b gets mutated? no — absorb reads, then we drop b)
          const flashColor = b.color;
          bh.absorb(b);
          // Spawn absorption flash at the BH position with body's color
          flashes.push(new Flash(bh.x, bh.y, flashColor));
          toRemove.push(i);
          break;
        }
      }
    }
    if (toRemove.length) {
      const set = new Set(toRemove);
      bodies = bodies.filter((_, idx) => !set.has(idx));
    }

    // Spawn polar-jet particles from each black hole
    for (const bh of blackHoles) {
      if (Math.random() < CONFIG.JET_RATE) {
        // Jets emit along the disk plane (tangent to spin direction)
        const tangent = bh.spin;                // base emission angle
        const wobble  = (Math.random() - 0.5) * 0.6;
        const angle   = tangent + Math.PI + wobble;
        const speed   = 2.2 + Math.random() * 4.5;
        const dist    = bh.radius * 1.1;
        const x = bh.x + Math.cos(angle) * dist;
        const y = bh.y + Math.sin(angle) * dist;
        const vx = Math.cos(angle) * speed + bh.vx;
        const vy = Math.sin(angle) * speed + bh.vy;
        // Hot orange / red-orange hues
        const hue = 10 + Math.random() * 25;
        jets.push(new JetParticle(x, y, vx, vy, CONFIG.JET_LIFE, hue));
      }
    }

    // Update jets: drift, decay
    for (let i = jets.length - 1; i >= 0; i--) {
      const p = jets[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.965;
      p.vy *= 0.965;
      p.life--;
      if (p.life <= 0) jets.splice(i, 1);
    }

    // Update flashes
    for (let i = flashes.length - 1; i >= 0; i--) {
      flashes[i].life--;
      if (flashes[i].life <= 0) flashes.splice(i, 1);
    }

    // Refill if depleted
    if (bodies.length < CONFIG.RESPAWN_THRESHOLD) {
      respawnBatch(CONFIG.RESPAWN_BATCH);
    }
  }

  // ============================================================
  // Render — trail fade + stars + bodies + black holes
  // ============================================================
  function drawNebula() {
    if (!CONFIG.NEBULA_ENABLED) return;
    for (const n of nebulae) {
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      grd.addColorStop(0.00, `hsla(${n.hue.toFixed(0)}, 80%, 55%, ${n.alpha.toFixed(3)})`);
      grd.addColorStop(0.55, `hsla(${n.hue.toFixed(0)}, 80%, 55%, ${(n.alpha * 0.35).toFixed(3)})`);
      grd.addColorStop(1.00, `hsla(${n.hue.toFixed(0)}, 80%, 55%, 0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawStars() {
    for (const s of stars) {
      s.phase += s.speed;
      const a = 0.25 + 0.45 * (0.5 + 0.5 * Math.sin(s.phase));
      ctx.fillStyle = `rgba(255,255,255,${(a * 0.55).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawVignette() {
    const grd = ctx.createRadialGradient(CX, CY, Math.min(W, H) * 0.30,
                                         CX, CY, Math.max(W, H) * 0.78);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  // ----- Body glow (additive composite) -----
  function drawBodyGlow(b) {
    const r = b.radius;
    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    const speedRatio = Math.min(speed / CONFIG.MAX_SPEED, 1);
    const boost = 0.6 + 0.5 * speedRatio; // faster body = brighter, bigger glow

    // Motion streak (line behind fast bodies)
    if (CONFIG.MOTION_STREAK && speed > 0.6) {
      const len = Math.min(speed * 3.5, 36);
      const inv = 1 / speed;
      const sx = b.x - b.vx * inv * len;
      const sy = b.y - b.vy * inv * len;
      const grd = ctx.createLinearGradient(sx, sy, b.x, b.y);
      grd.addColorStop(0.00, rgba(b.color, 0));
      grd.addColorStop(1.00, rgba(b.color, 0.55 * boost));
      ctx.strokeStyle = grd;
      ctx.lineWidth = Math.max(1.2, r * 1.4);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // Outer radial glow — larger for fast bodies
    const glowR = r * (4.6 + speedRatio * 2.0);
    const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowR);
    const a0 = Math.min(0.95, 0.55 + 0.35 * speedRatio);
    grd.addColorStop(0.00, rgba(b.color, a0));
    grd.addColorStop(0.30, rgba(b.color, a0 * 0.45));
    grd.addColorStop(0.70, rgba(b.color, a0 * 0.12));
    grd.addColorStop(1.00, rgba(b.color, 0.00));
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Colored core
    ctx.fillStyle = rgba(b.color, Math.min(1, 0.75 + 0.25 * speedRatio));
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.fill();

    // White-hot center for big bodies (extra bright when fast)
    if (r > 3) {
      ctx.fillStyle = `rgba(255,255,255,${(0.55 + 0.35 * speedRatio).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, r * (0.42 + 0.10 * speedRatio), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ----- Black-hole glow layers (additive composite) -----
  function drawBHGlow(bh) {
    const pulse = 1 + 0.12 * Math.sin(bh.t * 0.08);

    // Outer halo
    const haloR = bh.radius * 6.0 * pulse;
    const halo = ctx.createRadialGradient(bh.x, bh.y, bh.radius * 0.7,
                                          bh.x, bh.y, haloR);
    halo.addColorStop(0.00, 'rgba(255, 130,  60, 0.50)');
    halo.addColorStop(0.35, 'rgba(255,  60, 140, 0.22)');
    halo.addColorStop(0.70, 'rgba(120,  40, 200, 0.10)');
    halo.addColorStop(1.00, 'rgba(0,     0,   0, 0.00)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, haloR, 0, Math.PI * 2);
    ctx.fill();

    // Inner hot zone (intense near horizon)
    const innerR = bh.radius * 1.45;
    const innerHalo = ctx.createRadialGradient(bh.x, bh.y, bh.radius * 0.6,
                                                bh.x, bh.y, innerR);
    innerHalo.addColorStop(0, 'rgba(255, 200, 120, 0.55)');
    innerHalo.addColorStop(1, 'rgba(255, 100,  40, 0.00)');
    ctx.fillStyle = innerHalo;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, innerR, 0, Math.PI * 2);
    ctx.fill();

    // Accretion disk arcs — Doppler-shifted colors
    const inner = bh.radius * 1.35;
    const outer = bh.radius * 2.55;
    const segments = 18;
    for (let i = 0; i < segments; i++) {
      const t  = i / segments;
      const t2 = (i + 0.55) / segments;
      const a1 = bh.spin + t  * Math.PI * 2;
      const a2 = bh.spin + t2 * Math.PI * 2;
      const r  = inner + (outer - inner) * (0.5 + 0.5 * Math.cos(t * Math.PI * 2));

      // Doppler: one half approaching (blue), the other receding (red)
      let hue, sat, light;
      if (CONFIG.DOPPLER_DISK) {
        const dop = Math.sin(a1 - bh.spin); // -1 .. 1
        if (dop > 0) {
          // receding — red shift
          hue = 5 + (1 - dop) * 20;        // 5..25 (red→orange)
          sat = 100;
          light = 55;
        } else {
          // approaching — blue shift
          hue = 200 + (1 + dop) * 25;       // 200..225 (cyan→blue)
          sat = 100;
          light = 60;
        }
      } else {
        hue = (i * 26 + bh.spin * 60) % 360;
        sat = 100;
        light = 60;
      }
      ctx.strokeStyle = `hsla(${hue.toFixed(0)}, ${sat}%, ${light}%, 0.45)`;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.arc(bh.x, bh.y, r, a1, a2);
      ctx.stroke();
    }

    // Gravitational-lensing approximation: concentric arcs near the BH
    if (CONFIG.LENSING_RINGS) {
      ctx.save();
      ctx.translate(bh.x, bh.y);
      ctx.rotate(bh.spin * 0.5);
      const ringR = bh.radius * 4.2;
      for (let i = 0; i < 3; i++) {
        const rr = ringR + i * bh.radius * 0.7;
        const alpha = 0.06 - i * 0.015; // subtle so BHs remain visible
        ctx.strokeStyle = `rgba(180, 220, 255, ${alpha.toFixed(3)})`;
        ctx.lineWidth = 1.0;
        ctx.setLineDash([4, 7 + i * 2]);
        ctx.beginPath();
        ctx.arc(0, 0, rr, 0, Math.PI * 2);
        ctx.stroke();
      }
      // Photon ring — thin bright arc near horizon
      ctx.setLineDash([]);
      ctx.strokeStyle = 'rgba(255, 235, 200, 0.45)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(0, 0, bh.radius * 1.22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Spawn shockwave (expanding ring fading out)
    if (bh.shock > 0) {
      const swR = (1 - bh.shock) * bh.radius * 9;
      ctx.strokeStyle = `rgba(255, 140, 70, ${(bh.shock * 0.60).toFixed(3)})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bh.x, bh.y, swR, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = `rgba(255, 220, 180, ${(bh.shock * 0.32).toFixed(3)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bh.x, bh.y, swR * 0.7, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // ----- Event horizon — opaque black on top of glow layers -----
  function drawEventHorizon(bh) {
    // Hot orange edge ring (just inside horizon)
    const edgeGrd = ctx.createRadialGradient(bh.x, bh.y, bh.radius * 0.85,
                                             bh.x, bh.y, bh.radius * 1.20);
    edgeGrd.addColorStop(0, 'rgba(255,  90,  30, 0.00)');
    edgeGrd.addColorStop(0.6, 'rgba(255, 130,  40, 0.65)');
    edgeGrd.addColorStop(1, 'rgba(255, 200,  90, 0.00)');
    ctx.fillStyle = edgeGrd;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.radius * 1.20, 0, Math.PI * 2);
    ctx.fill();

    // Pure black event horizon (must block underlying glow)
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.radius, 0, Math.PI * 2);
    ctx.fill();

    // Sharp orange rim
    ctx.strokeStyle = 'rgba(255, 110, 50, 0.95)';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ----- Polar jet particles -----
  function drawJets() {
    for (const p of jets) {
      const t = p.life / p.maxLife;
      const alpha = t * 0.85;
      const r = p.size * (0.5 + 1.0 * t);

      // Glow
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 5);
      grd.addColorStop(0.00, `hsla(${p.hue.toFixed(0)}, 100%, 65%, ${alpha.toFixed(3)})`);
      grd.addColorStop(0.50, `hsla(${p.hue.toFixed(0)}, 100%, 55%, ${(alpha * 0.35).toFixed(3)})`);
      grd.addColorStop(1.00, `hsla(${p.hue.toFixed(0)}, 100%, 55%, 0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 5, 0, Math.PI * 2);
      ctx.fill();

      // Hot core
      ctx.fillStyle = `hsla(${p.hue.toFixed(0)}, 100%, 75%, ${Math.min(1, alpha + 0.1).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ----- Absorption flash -----
  function drawFlashes() {
    for (const f of flashes) {
      const t = f.life / f.maxLife;
      const grow = 1 - t;                         // 0..1 over lifetime
      const r = 6 + grow * 70;
      const alpha = t * 0.9;

      // Outer expanding ring
      const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
      grd.addColorStop(0.00, rgba(f.color, alpha));
      grd.addColorStop(0.35, rgba(f.color, alpha * 0.5));
      grd.addColorStop(1.00, rgba(f.color, 0));
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Bright inner core
      const cr = r * 0.35;
      const cgrd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, cr);
      cgrd.addColorStop(0, `rgba(255,255,255,${(alpha * 0.95).toFixed(3)})`);
      cgrd.addColorStop(0.5, rgba(f.color, alpha * 0.7));
      cgrd.addColorStop(1, rgba(f.color, 0));
      ctx.fillStyle = cgrd;
      ctx.beginPath();
      ctx.arc(f.x, f.y, cr, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function render() {
    // ---- LAYER 0: Trail fade (semi-transparent black) ----
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(0,0,0,${CONFIG.TRAIL_FADE})`;
    ctx.fillRect(0, 0, W, H);

    // ---- LAYER 1: Background — nebula + stars ----
    drawNebula();
    drawStars();

    // ---- LAYER 2: Switch to ADDITIVE for all emission/glow layers ----
    if (CONFIG.USE_ADDITIVE_GLOW) ctx.globalCompositeOperation = 'lighter';

    // BH halos & accretion disks
    for (const bh of blackHoles) drawBHGlow(bh);

    // Polar jets (drawn before bodies so they sit behind trails but additive)
    drawJets();

    // Bodies with motion streaks
    for (const b of bodies) drawBodyGlow(b);

    // Absorption flashes (always on top of bodies)
    drawFlashes();

    // ---- LAYER 3: Switch back to source-over for opaque elements ----
    ctx.globalCompositeOperation = 'source-over';

    // Event horizons — opaque black
    for (const bh of blackHoles) drawEventHorizon(bh);

    // ---- LAYER 4: Vignette darkens corners ----
    if (CONFIG.DARKEN_CORNERS) drawVignette();

    // ---- HUD ----
    statBodies.textContent = bodies.length;
    statHoles.textContent  = blackHoles.length;
  }

  // ============================================================
  // Input
  // ============================================================
  function spawnBH(clientX, clientY) {
    blackHoles.push(new BlackHole(clientX, clientY));
  }

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    spawnBH(e.clientX, e.clientY);
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      spawnBH(t.clientX, t.clientY);
    }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    switch (e.key.toLowerCase()) {
      case 'r':
initBodies();
        initNebulae();
        flashes.length = 0;
        jets.length = 0;
        // Re-paint background so trails don't carry over old positions
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        break;
      case ' ':
      case 'spacebar': // older browsers
        paused = !paused;
        statState.textContent = paused ? 'PAUSE' : 'RUN';
        statState.className   = paused ? 'v paused' : 'v';
        pauseBanner.classList.toggle('on', paused);
        e.preventDefault();
        break;
      case 'h':
        hudVisible = !hudVisible;
        hudTitle.classList.toggle('hidden', !hudVisible);
        hudStats.classList.toggle('hidden', !hudVisible);
        break;
    }
  });

  window.addEventListener('resize', resize);

  // ============================================================
  // Main loop with FPS smoothing
  // ============================================================
  let lastT = performance.now();
  let fpsEMA = 60;
  let fpsTimer = 0;

  function loop(now) {
    const dtMs = now - lastT;
    lastT = now;

    // Smooth FPS using exponential moving average
    const inst = dtMs > 0 ? 1000 / dtMs : 60;
    fpsEMA = fpsEMA * 0.92 + inst * 0.08;
    fpsTimer += dtMs;
    if (fpsTimer > 250) {
      statFps.textContent = Math.round(fpsEMA);
      fpsTimer = 0;
    }

    update();
    render();
    requestAnimationFrame(loop);
  }

  // ============================================================
  // Boot
  // ============================================================
  resize();
  initStars();
  initNebulae();
  initBodies();

  // Pre-fill canvas with solid black so first trail-fade frames look clean
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(loop);
})();
</script>
</body>
